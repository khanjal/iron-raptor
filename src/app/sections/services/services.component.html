<section id="gaming" class="section bg-secondary/20">
  <div class="container-custom">

    <div class="text-center mb-16">
      <span class="block font-mono text-accent/70 text-sm tracking-widest uppercase">{{ config.gaming.subheading }}</span>
      <h2 class="section-title mt-3">{{ config.gaming.heading }}</h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (item of config.gaming.items; track item.title) {
        <div class="card group hover:shadow-glow hover:-translate-y-1 transition-all duration-300">
          <div class="text-5xl mb-5 group-hover:scale-110 transition-transform duration-300 select-none">
            {{ item.icon }}
          </div>
          <h3 class="text-xl font-bold mb-3 text-text-primary">{{ item.title }}</h3>
          <p class="text-text-secondary leading-relaxed">{{ item.description }}</p>
        </div>
      }
    </div>

    @if (config.gaming.streamsUrl) {
      <div class="text-center mt-12">
        <a [href]="config.gaming.streamsUrl" target="_blank" rel="noopener noreferrer"
           class="btn btn-primary inline-flex items-center gap-2">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <path d="M2.149 0l-1.612 4.319v16.683h5.731v3h3.224l2.997-3h4.836l6.475-6.475v-14.527h-21.651zm19.651 13.335l-3.464 3.464h-5.657l-2.997 3v-3h-4.731v-15.799h16.849v12.335zm-3.464-6.149v5.321h-2v-5.321h2zm-5.321 0v5.321h-2v-5.321h2z"/>
          </svg>
          {{ config.gaming.streamsLabel || 'Watch Us Live' }}
        </a>
      </div>
    }

  </div>
</section>
