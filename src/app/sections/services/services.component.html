<section id="services" class="section bg-secondary/20">
  <div class="container-custom">

    <div class="text-center mb-16">
      <span class="block font-mono text-accent/70 text-sm tracking-widest uppercase">What we play</span>
      <h2 class="section-title mt-3">Games</h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (service of config.services; track service.title) {
        <div class="card group hover:shadow-glow hover:-translate-y-1 transition-all duration-300">
          <div class="text-5xl mb-5 group-hover:scale-110 transition-transform duration-300 select-none">
            {{ service.icon }}
          </div>
          <h3 class="text-xl font-bold mb-3 text-text-primary">{{ service.title }}</h3>
          <p class="text-text-secondary leading-relaxed">{{ service.description }}</p>
        </div>
      }
    </div>

  </div>
</section>
