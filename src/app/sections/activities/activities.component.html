<section id="activities" class="section">
  <div class="container-custom">

    <div class="text-center mb-16">
      <span class="block font-mono text-accent/70 text-sm tracking-widest uppercase">{{ config.activities.subheading }}</span>
      <h2 class="section-title mt-3">{{ config.activities.heading }}</h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (item of config.activities.items; track item.title) {
        <div class="card group transition-all duration-300"
             [class.shadow-glow]="openCard() === item.title"
             [class.-translate-y-1]="openCard() !== item.title">
          <!-- Card header -->
          <button type="button"
                  class="w-full text-left cursor-pointer"
                  (click)="toggleCard(item.title)"
                  [attr.aria-expanded]="openCard() === item.title">
            <div class="text-5xl mb-5 group-hover:scale-110 transition-transform duration-300 select-none">
              {{ item.icon }}
            </div>
            <div class="flex items-center justify-between gap-2">
              <h3 class="text-xl font-bold text-text-primary">{{ item.title }}</h3>
              @if (item.details && item.details.length) {
                <svg class="w-4 h-4 text-accent/70 flex-shrink-0 transition-transform duration-200"
                     [class.rotate-180]="openCard() === item.title"
                     fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
              }
            </div>
            <p class="text-text-secondary leading-relaxed mt-3">{{ item.description }}</p>
          </button>

          <!-- Expanded detail panel -->
          @if (openCard() === item.title && item.details && item.details.length) {
            <div class="mt-5 pt-5 border-t border-soft">
              <ul class="list-disc list-inside space-y-1">
                @for (detail of item.details; track detail) {
                  <li class="text-text-secondary text-sm">{{ detail }}</li>
                }
              </ul>
            </div>
          }
        </div>
      }
    </div>

  </div>
</section>
