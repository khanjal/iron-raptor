<section class="section">
  <div class="container-custom">

    <div class="text-center mb-8">
      <span class="block font-mono text-accent/70 text-sm tracking-widest uppercase">Projects</span>
      <h2 class="section-title mt-3">Projects</h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      @for (proj of config.services; track proj.title) {
        <div class="card cursor-pointer" (click)="open(proj.title)">
          <div class="text-4xl mb-2 select-none">{{ proj.icon }}</div>
          <h3 class="text-xl font-bold">{{ proj.title }}</h3>
          <p class="text-text-secondary mt-2">{{ proj.description }}</p>
        </div>
      }
    </div>

  </div>
</section>
